name: Builds Docker image and push to ACR

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      build_context:
        required: false
        type: string
        default: .
      deploy_namespace:
        type: string
      deploy_name:
        type: string
    secrets:
      GH_APP_ID:
        required: true
      GH_APP_INSTALLATION_ID:
        required: true
      GH_APP_PRIVATE_KEY:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      AZURE_CLIENT_ID:
        required: true
      AZURE_CONTAINER_REGISTRY:
        required: true

jobs:
  acr-build:
    runs-on:
      group: ArcCI
    steps:
      - name: GitHub login
        id: auth
        uses: TimoWilhelm/action-github-app-auth@v1.0.0
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          installation-id: ${{ secrets.GH_APP_INSTALLATION_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          set-git-credentials: true

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.auth.outputs.access-token }}
          submodules: recursive

      # for pull base images
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set build variables
        id: build_vars
        run: |
          az login --service-principal -u "$AZURE_CLIENT_ID" -t "$AZURE_TENANT_ID" --federated-token "$(cat "$AZURE_FEDERATED_TOKEN_FILE")"
          az acr login --name ${{ secrets.AZURE_CONTAINER_REGISTRY }}

          TRIVY_IGNOREFILE=""
          if [ -f ".trivyignore" ]; then
            TRIVY_IGNOREFILE=".trivyignore"
          fi
          echo "trivy_ignorefile=$TRIVY_IGNOREFILE" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ inputs.image_name }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
          DOCKER_BUILD_RECORD_RETENTION_DAYS: 3
        with:
          context: ${{ inputs.build_context }}
          load: true
          secrets: |
            GIT_AUTH_TOKEN=${{ steps.auth.outputs.access-token }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_SKIP_VERSION_CHECK: "true"
          TRIVY_DISABLE_VEX_NOTICE: "true"
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          timeout: 15m
          trivyignores: ${{ steps.build_vars.outputs.trivy_ignorefile }}

      - name: Push Docker image
        run: |
          docker push ${{ steps.meta.outputs.tags }}

  deploy:
    needs: acr-build
    if: inputs.deploy_namespace != '' && inputs.deploy_name != ''
    runs-on:
      group: ArcCI
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Rollout restart deployment
        id: restart
        run: |
          if kubectl get deployment -n ${{ inputs.deploy_namespace }} ${{ inputs.deploy_name }} > /dev/null 2>&1; then
            kubectl rollout restart deployment -n ${{ inputs.deploy_namespace }} ${{ inputs.deploy_name }}
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "${{ inputs.deploy_namespace }}/${{ inputs.deploy_name }} not exist, skipping restart"
            echo "success=false" >> $GITHUB_OUTPUT
          fi

      # https://docs.slack.dev/tools/slack-github-action/sending-techniques/sending-data-slack-incoming-webhook/
      - name: Slack notification
        uses: slackapi/slack-github-action@v3
        if: steps.restart.outputs.success == 'true'
        with:
          webhook: ${{ secrets.DEPLOY_SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "*Deployment Update*\n`${{ inputs.deploy_namespace }}/${{ inputs.deploy_name }}` has been updated\nBranch: `${{ github.ref_name }}`\nCommit: `${{ github.sha }}`"
